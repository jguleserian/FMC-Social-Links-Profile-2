<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Social links profile</title>
    <meta
      name="description"
      content="This is a solution to the Social links profile challenge on Frontend Mentor."
    />
    <link
      rel="preload"
      href="./assets/fonts/static/Inter-Regular.ttf"
      as="font"
      type="font/truetype"
      crossorigin
    />
    <link
      rel="preload"
      href="./assets/fonts/static/Inter-Bold.ttf"
      as="font"
      type="font/truetype"
      crossorigin
    />
    <link
      rel="preload"
      href="./assets/fonts/static/Inter-SemiBold.ttf"
      as="font"
      type="font/truetype"
      crossorigin
    />

    <link rel="stylesheet" href="styles2.css" />
  </head>
  <body>
    <main class="card">
      <section class="avatar">
        <img
          src="./assets/images/avatar-jessica.jpeg"
          alt="Jessica Randall's avatar"
          class="avatar__image"
          height="88"
          width="88"
        />
        <h1 class="avatar__name">Jessica Randall</h1>
        <address class="avatar__location">London, United Kingdom</address>
        <p class="avatar__bio">"Front-end developer and avid reader."</p>
      </section>
      <section class="social">
        <a
          href="https://github.com/jguleserian/"
          class="social__link"
          target="_blank"
          rel="noopener noreferrer"
          tabindex="-1"
          ><button type="button" class="social__button">GitHub</button></a
        >
        <a
          href="https://www.frontendmentor.io/profile/jguleserian
"
          class="social__link"
          target="_blank"
          rel="noopener noreferrer"
          tabindex="-1"
          ><button type="button" class="social__button">
            Frontend Mentor
          </button></a
        >
        <a
          href="https://www.linkedin.com/in/jeffguleserian
"
          class="social__link"
          target="_blank"
          rel="noopener noreferrer"
          tabindex="-1"
          ><button type="button" class="social__button">LinkedIn</button></a
        >
        <a
          href="https://x.com/login
"
          class="social__link"
          target="_blank"
          rel="noopener noreferrer"
          tabindex="-1"
          ><button type="button" class="social__button">Twitter</button></a
        >
        <a
          href="https://www.instagram.com/
"
          class="social__link"
          target="_blank"
          rel="noopener noreferrer"
          tabindex="-1"
          ><button type="button" class="social__button">Instagram</button></a
        >
      </section>

      <div class="card__attribution">
        Challenge by
        <a
          href="https://www.frontendmentor.io?ref=challenge"
          target="_blank"
          rel="noopener"
          >Frontend Mentor</a
        >. Coded by
        <a
          href="https://www.frontendmentor.io/profile/jguleserian
"
          rel="noopener noreferrer"
          >Jeff Guleserian</a
        >.
      </div>
    </main>
  </body>
</html>
